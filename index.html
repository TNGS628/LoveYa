
<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дахин миний найз охин болооч?</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);position:relative;overflow:hidden}
.stars{position:absolute;width:100%;height:100%;overflow:hidden;z-index:0}
.star{position:absolute;border-radius:50%;animation:twinkle linear infinite}
@keyframes twinkle{0%,100%{opacity:0.2;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
.container{background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.12);border-radius:28px;padding:56px 48px;text-align:center;max-width:480px;width:90%;position:relative;z-index:1}
h1{font-family:'Pacifico',cursive;font-size:2.4em;color:#f8c8d4;margin-bottom:8px;line-height:1.3}
.subtitle{color:rgba(255,255,255,0.55);font-size:0.95em;margin-bottom:32px}
.quote{color:rgba(255,255,255,0.85);font-size:1.3em;font-weight:600;line-height:1.6;margin:24px 0 36px}
.moon{font-size:4em;display:block;margin:0 auto 16px;animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.buttons{display:flex;gap:16px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:8px}
button{font-family:'Nunito',sans-serif;font-weight:700;border:none;border-radius:50px;cursor:pointer;transition:all 0.3s ease;font-size:1.1em}
#yesBtn{background:linear-gradient(135deg,#e96c8a,#c44f7e);color:white;padding:16px 36px;box-shadow:0 4px 20px rgba(233,108,138,0.4)}
#yesBtn:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(233,108,138,0.6)}
#noBtn{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.2);padding:16px 36px}
#noBtn:hover{background:rgba(255,255,255,0.15)}
#success{display:none}
#success h1{font-size:2.8em;color:#f8c8d4;margin-bottom:16px}
#success p{color:rgba(255,255,255,0.8);font-size:1.25em;line-height:1.7;margin-top:16px}
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;animation:fall 3s ease-out forwards;pointer-events:none}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="stars" id="starsBg"></div>
<div class="container">
  <div id="question">
    <span class="moon">🌙</span>
    <h1>Нэг асуулт байна...</h1>
    <p class="subtitle">Ирээдүйд үүрд надтай хамт байгаач Номиллл</p>
    <p class="quote">Амьдралынхаа үлдсэн бүх өдрүүдийг чамтайгаа өнгөрөөхийг хүсч байна.<br><br></p>
    <div class="buttons">
      <button id="yesBtn">Дааа 💖</button>
      <button id="noBtn">Чадкүээ</button>
    </div>
  </div>
  <div id="success">
    <span style="font-size:5em;display:block;margin-bottom:16px;animation:float 3s ease-in-out infinite">✨</span>
    <h1>Хайртай жүүүү!</h1>
  </div>
</div>

<script>
const yesBtn = document.getElementById('yesBtn');
const noBtn = document.getElementById('noBtn');
const questionDiv = document.getElementById('question');
const successDiv = document.getElementById('success');

function createStars() {
  const bg = document.getElementById('starsBg');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;background:white;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${Math.random()*4+2}s;animation-delay:${Math.random()*5}s`;
    bg.appendChild(s);
  }
}
createStars();

function confetti() {
  const colors = ['#e96c8a','#f8c8d4','#c9b8ff','#a8d8ea','#ffd6a5','#fff'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.cssText = `left:${Math.random()*100}%;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*0.5}s`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3500);
    }, i * 25);
  }
}

let noclicks = 0;
let yp = 16, np = 16;
const noTexts = ['Үгүй','Итгэлтэй юу?','Нэг бодоод үз','Гуйя даа 🥺','Хажуудаа байлгаач...','Сүүлийн боломж шүү'];

noBtn.addEventListener('click', () => {
  noclicks++;
  np = Math.max(6, np - 2);
  noBtn.style.padding = `${np}px ${np*2}px`;
  noBtn.style.fontSize = `${Math.max(0.6, 1.1 - noclicks*0.09)}em`;
  noBtn.style.opacity = Math.max(0.25, 1 - (noclicks > 4 ? (noclicks-4)*0.12 : 0));
  yp += 4;
  yesBtn.style.padding = `${yp}px ${yp*2}px`;
  yesBtn.style.fontSize = `${1.1 + noclicks*0.12}em`;
  if (noclicks < noTexts.length) noBtn.textContent = noTexts[noclicks];
  noBtn.style.animation = 'none';
  void noBtn.offsetWidth;
  noBtn.style.animation = 'shake 0.4s';
});

yesBtn.addEventListener('click', () => {
  questionDiv.style.display = 'none';
  successDiv.style.display = 'block';
  confetti();
});

const shakeStyle = document.createElement('style');
shakeStyle.textContent = '@keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-8px)}70%{transform:translateX(8px)}}';
document.head.appendChild(shakeStyle);
</script>
</body>
</html>
